<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedbackbogen</title>
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    line-height: 1.5;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }
  p.intro {
    color: #666;
    margin-top: 0;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    margin-top: 2rem;
  }
  label {
    font-weight: 600;
    display: block;
    margin-bottom: 0.4rem;
  }
  input, textarea, select {
    width: 100%;
    padding: 0.6rem 0.7rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }
  textarea {
    min-height: 120px;
    resize: vertical;
  }
  .rating {
    display: flex;
    gap: 0.5rem;
  }
  .rating label {
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-bottom: 0;
  }
  button {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    align-self: flex-start;
  }
  button:hover {
    background: #1d4ed8;
  }
</style>
</head>
<body>

  <h1>Feedbackbogen</h1>
  <p class="intro">Bitte fülle das Formular aus. Nach dem Absenden öffnet sich dein E-Mail-Programm mit deinen Antworten – dort einfach senden.</p>

  <form id="feedback-form">
    <div>
      <label for="name">Name (optional)</label>
      <input type="text" id="name" name="name">
    </div>

    <div>
      <label for="klasse">Klasse / Kurs</label>
      <input type="text" id="klasse" name="klasse">
    </div>

    <div>
      <label>Wie hat dir das Thema insgesamt gefallen?</label>
      <div class="rating">
        <label><input type="radio" name="bewertung" value="1 - sehr schlecht"> 1</label>
        <label><input type="radio" name="bewertung" value="2 - schlecht"> 2</label>
        <label><input type="radio" name="bewertung" value="3 - okay"> 3</label>
        <label><input type="radio" name="bewertung" value="4 - gut"> 4</label>
        <label><input type="radio" name="bewertung" value="5 - sehr gut"> 5</label>
      </div>
    </div>

    <div>
      <label for="positiv">Was hat dir besonders gut gefallen?</label>
      <textarea id="positiv" name="positiv"></textarea>
    </div>

    <div>
      <label for="verbesserung">Was könnte verbessert werden?</label>
      <textarea id="verbesserung" name="verbesserung"></textarea>
    </div>

    <button type="submit">Feedback absenden</button>
  </form>

  <script>
    const EMPFAENGER_EMAIL = "tomgruenig87@gmail.com";

    document.getElementById("feedback-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const data = new FormData(e.target);

      const name = data.get("name") || "(anonym)";
      const klasse = data.get("klasse") || "-";
      const bewertung = data.get("bewertung") || "-";
      const positiv = data.get("positiv") || "-";
      const verbesserung = data.get("verbesserung") || "-";

      const subject = encodeURIComponent("Feedbackbogen: " + klasse);
      const body = encodeURIComponent(
        `Name: ${name}\nKlasse/Kurs: ${klasse}\nBewertung: ${bewertung}\n\nPositiv:\n${positiv}\n\nVerbesserungsvorschläge:\n${verbesserung}`
      );

      window.location.href = `mailto:${EMPFAENGER_EMAIL}?subject=${subject}&body=${body}`;
    });
  </script>

</body>
</html>
