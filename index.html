<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Feedback zum Schuljahr</title>
<style>
  :root {
    color-scheme: dark;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a url("assets/background.jpg") center / cover fixed no-repeat;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0.75) 100%);
    pointer-events: none;
  }

  .stage {
    position: relative;
    width: min(340px, 90vw);
    height: min(600px, 84vh);
    touch-action: pan-y;
    overflow: hidden;
    border-radius: 34px;
  }

  .deck {
    position: absolute;
    inset: 0;
    display: flex;
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }

  .deck.dragging {
    transition: none;
  }

  .device {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    padding: 14px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    background: linear-gradient(155deg, #7a7a7e 0%, #4b4b4f 35%, #2a2a2c 75%, #1c1c1e 100%);
    border-radius: 34px;
    box-shadow:
      0 20px 45px rgba(0, 0, 0, 0.55),
      inset 0 1px 1px rgba(255, 255, 255, 0.25),
      inset 0 -1px 2px rgba(0, 0, 0, 0.4);
    position: relative;
  }

  .device::before {
    content: "";
    position: absolute;
    top: 6px;
    left: 10%;
    right: 10%;
    height: 40%;
    border-radius: 50%;
    background: linear-gradient(rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
    pointer-events: none;
  }

  .screen {
    flex: 1;
    background: #060606;
    border-radius: 22px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 1.1rem 1.1rem 0.8rem;
    min-height: 0;
  }

  .screen .brand {
    position: absolute;
    left: 16px;
    bottom: 10px;
    font-size: 0.68rem;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.45);
  }

  .screen .deco-icon {
    position: absolute;
    right: 16px;
    top: 12px;
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.4);
  }

  .question-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 1.1rem;
    padding: 0.5rem 0.25rem 1.6rem;
    min-height: 0;
    overflow-y: auto;
  }

  .question-text {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.4;
    padding: 0 0.25rem;
  }

  .intro .question-text {
    font-size: 1.35rem;
  }

  .intro p.sub {
    font-size: 0.88rem;
    color: rgba(255, 255, 255, 0.6);
    max-width: 24ch;
    margin: 0;
  }

  .stars-row {
    display: flex;
    gap: 0.35rem;
  }

  .stars-row button {
    background: none;
    border: none;
    font-size: 2.1rem;
    line-height: 1;
    color: rgba(255, 255, 255, 0.25);
    cursor: pointer;
    padding: 0.15rem;
    transition: transform 0.12s ease, color 0.12s ease;
  }

  .stars-row button.filled {
    color: #e0a850;
  }

  .stars-row button:active {
    transform: scale(1.2);
  }

  .scale-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .scale-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
    width: 100%;
    max-width: 250px;
  }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 250px;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.55);
  }

  .slider-wrap {
    width: 100%;
    max-width: 250px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }

  .slider-wrap input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 2px;
    outline: none;
  }

  .slider-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #e0a850;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
  }

  .slider-wrap input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: #e0a850;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
  }

  .scale-row button {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease, color 0.12s ease;
  }

  .scale-row button.filled {
    background: #e0a850;
    border-color: #e0a850;
    color: #1c1c1e;
  }

  .scale-row button:active {
    transform: scale(1.15);
  }

  .text-answer {
    width: 100%;
  }

  .text-answer textarea {
    width: 100%;
    min-height: 100px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 12px;
    color: #fff;
    font-size: 0.95rem;
    font-family: inherit;
    padding: 0.7rem 0.8rem;
    resize: none;
  }

  .text-answer textarea:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.45);
  }

  .emoji-answer input {
    width: 100%;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 12px;
    color: #fff;
    font-size: 1.6rem;
    text-align: center;
    padding: 0.6rem 0.5rem;
  }

  .emoji-answer input:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.45);
  }

  .submit-btn {
    margin-top: 0.5rem;
    padding: 0.75rem 1.8rem;
    border: none;
    border-radius: 999px;
    background: #fff;
    color: #111;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .submit-btn:disabled {
    opacity: 0.5;
  }

  .scrubber {
    padding: 0 0.2rem;
    flex-shrink: 0;
  }

  .scrubber .track {
    height: 3px;
    background: rgba(255, 255, 255, 0.22);
    border-radius: 2px;
    position: relative;
  }

  .scrubber .track .fill {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    background: #fff;
    border-radius: 2px;
  }

  .scrubber .track .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
  }

  .scrubber .labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 6px;
  }

  .transport {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 0.5rem 0.2rem;
    flex-shrink: 0;
  }

  .transport button.nav {
    background: none;
    border: none;
    color: #fff;
    padding: 0.5rem 0.7rem;
    cursor: pointer;
    opacity: 0.9;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .transport button.nav:disabled {
    opacity: 0.2;
    cursor: default;
  }

  .transport .dot-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
  }

  .final-screen .question-text {
    font-size: 1.25rem;
  }

  .final-screen .emoji-big {
    font-size: 2.4rem;
  }
</style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="deck" id="deck"></div>
  </div>

  <script src="assets/qrcode.js"></script>
  <script type="module" src="assets/firebase-init.js"></script>
  <script>
    const ICON_PREV = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6v12l-8-6 8-6zm-9 0v12l-8-6 8-6z"/></svg>';
    const ICON_NEXT = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6v12l8-6-8-6zm9 0v12l8-6-8-6z"/></svg>';

    function whenFirebaseReady(callback) {
      if (window.fbDb) {
        callback();
        return;
      }
      const iv = setInterval(function () {
        if (window.fbDb) {
          clearInterval(iv);
          callback();
        }
      }, 50);
    }

    const klasse = new URLSearchParams(window.location.search).get("klasse") || "";

    const QUESTIONS = [
      { type: "stars", key: "atmosphaere", text: "Wie fandest du die Atmosphäre im Unterricht?" },
      { type: "stars", key: "abwechslung", text: "Wie abwechslungsreich fandest du den Unterricht?" },
      { type: "stars", key: "hilfe", text: "Habe ich dir bei Problemen weitergeholfen?" },
      { type: "stars", key: "verstaendlich", text: "Wie fandest du die Erklärungen?" },
      { type: "stars", key: "fairness", text: "Wie fair fandest du die Bewertungen/Noten?" },
      { type: "stars", key: "begeisterung", text: "Konnte ich dich für das Fach begeistern?" },
      { type: "stars", key: "pruefungsvorbereitung", text: "Hat dich der Unterricht gut auf Prüfungen vorbereitet?" },
      { type: "stars", key: "ruhe", text: "War der Unterricht ruhig und frei von Störungen?" },
      { type: "stars", key: "regeln", text: "War der Unterricht mit klaren Regeln strukturiert?" },
      { type: "stars", key: "humor", text: "War ich humorvoll?" },
      { type: "slider", key: "gelassenheit", text: "Wie wirke ich auf dich?", endLabels: ["Hektisch", "Gelassen"] },
      { type: "scale10", key: "zufriedenheit", text: "Wie zufrieden warst du insgesamt mit dem Schuljahr?", endLabels: ["1 = nicht zufrieden", "10 = voll zufrieden"] },
      { type: "text", key: "gelernt", text: "Was hast du dieses Schuljahr gelernt?" },
      { type: "text", key: "gefallen", text: "Was hat dir am besten gefallen?" },
      { type: "text", key: "projekt", text: "Gibt es ein Projekt, das dir besonders gefiel?" },
      { type: "text", key: "methoden", text: "Welche Methoden haben dir gut gefallen? (z. B. Einzelarbeit, Partnerarbeit, Kurzreferate, iPad-Arbeit, kreative Aufgaben)" },
      { type: "text", key: "aendern", text: "Was hat dir weniger gefallen / was würdest du ändern?" },
      { type: "text", key: "schwierig", text: "Was war für dich am schwierigsten?" },
      { type: "emoji", key: "emojis", text: "Beschreib den Unterricht in Emojis 😄" },
      { type: "text", key: "sonstiges", text: "Möchtest du mir noch etwas sagen?" }
    ];

    const answers = {};
    const stage = document.getElementById("stage");
    const deck = document.getElementById("deck");

    if (!klasse) {
      deck.appendChild(buildMessageCard("🔗", "Für dieses Formular fehlt der Klassen-Link. Bitte nutze den QR-Code bzw. Link, den dir deine Lehrkraft gegeben hat."));
    } else {
      const cards = [buildIntroCard()];
      QUESTIONS.forEach(function (q, i) {
        cards.push(buildQuestionCard(q, i));
      });
      cards.push(buildSubmitCard());
      cards.forEach(function (c) { deck.appendChild(c); });
      setupSwipe(cards.length);
    }

    function buildIntroCard() {
      const device = document.createElement("div");
      device.className = "device";
      device.innerHTML =
        '<div class="screen intro">' +
          '<span class="deco-icon">🎓</span>' +
          '<div class="question-body">' +
            '<div class="question-text">Feedback zum Schuljahr</div>' +
            '<p class="sub">Schön, dass du dir Zeit nimmst. Anonym, ehrlich, wische einfach durch.</p>' +
          '</div>' +
          '<div class="brand">Klasse ' + escapeHtml(klasse) + '</div>' +
        '</div>' +
        buildScrubberHtml() +
        buildTransportHtml();
      return device;
    }

    function buildSubmitCard() {
      const device = document.createElement("div");
      device.className = "device";
      device.innerHTML =
        '<div class="screen final-screen">' +
          '<span class="deco-icon">🌱</span>' +
          '<div class="question-body">' +
            '<div class="question-text">Fertig! Danke für dein ehrliches Feedback.</div>' +
            '<button type="button" class="submit-btn" id="submit-btn">Feedback abschicken</button>' +
          '</div>' +
          '<div class="brand">Klasse ' + escapeHtml(klasse) + '</div>' +
        '</div>' +
        buildScrubberHtml() +
        buildTransportHtml();

      device.querySelector("#submit-btn").addEventListener("click", function (e) {
        e.stopPropagation();
        submitFeedback(device);
      });
      return device;
    }

    function buildQuestionCard(q, index) {
      const device = document.createElement("div");
      device.className = "device";

      let answerHtml = "";
      if (q.type === "stars") {
        answerHtml = '<div class="stars-row" data-key="' + q.key + '"></div>';
      } else if (q.type === "emoji") {
        answerHtml = '<div class="emoji-answer"><input type="text" data-key="' + q.key + '" placeholder="🎸📚🔥"></div>';
      } else if (q.type === "scale10") {
        answerHtml = '<div class="scale-wrap"><div class="scale-row" data-key="' + q.key + '"></div>' +
          (q.endLabels ? '<div class="scale-labels"><span>' + escapeHtml(q.endLabels[0]) + '</span><span>' + escapeHtml(q.endLabels[1]) + '</span></div>' : '') +
          '</div>';
      } else if (q.type === "slider") {
        answerHtml = '<div class="slider-wrap">' +
          '<input type="range" min="1" max="5" step="1" value="3" data-key="' + q.key + '">' +
          '<div class="scale-labels"><span>' + escapeHtml(q.endLabels[0]) + '</span><span>' + escapeHtml(q.endLabels[1]) + '</span></div>' +
          '</div>';
      } else {
        answerHtml = '<div class="text-answer"><textarea data-key="' + q.key + '"></textarea></div>';
      }

      device.innerHTML =
        '<div class="screen">' +
          '<span class="deco-icon">✦</span>' +
          '<div class="question-body">' +
            '<div class="question-text">' + escapeHtml(q.text) + '</div>' +
            answerHtml +
          '</div>' +
          '<div class="brand">Klasse ' + escapeHtml(klasse) + '</div>' +
        '</div>' +
        buildScrubberHtml() +
        buildTransportHtml();

      if (q.type === "stars") {
        const row = device.querySelector(".stars-row");
        for (let i = 1; i <= 5; i++) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = "★";
          btn.dataset.value = i;
          row.appendChild(btn);
        }
        const buttons = Array.from(row.querySelectorAll("button"));
        buttons.forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            const value = Number(btn.dataset.value);
            const current = answers[q.key] || 0;
            answers[q.key] = current === value ? 0 : value;
            buttons.forEach(function (b) {
              b.classList.toggle("filled", Number(b.dataset.value) <= answers[q.key]);
            });
          });
        });
      } else if (q.type === "scale10") {
        const row = device.querySelector(".scale-row");
        for (let i = 1; i <= 10; i++) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = i;
          btn.dataset.value = i;
          row.appendChild(btn);
        }
        const buttons = Array.from(row.querySelectorAll("button"));
        buttons.forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            const value = Number(btn.dataset.value);
            const current = answers[q.key] || 0;
            answers[q.key] = current === value ? 0 : value;
            buttons.forEach(function (b) {
              b.classList.toggle("filled", Number(b.dataset.value) === answers[q.key]);
            });
          });
        });
      } else if (q.type === "slider") {
        const input = device.querySelector("input[type='range']");
        answers[q.key] = Number(input.value);
        input.addEventListener("input", function () {
          answers[q.key] = Number(input.value);
        });
        input.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
        input.addEventListener("touchstart", function (e) { e.stopPropagation(); }, { passive: true });
      } else {
        const field = device.querySelector("[data-key='" + q.key + "']");
        field.addEventListener("input", function () {
          answers[q.key] = field.value;
        });
        field.addEventListener("pointerdown", function (e) { e.stopPropagation(); });
        field.addEventListener("touchstart", function (e) { e.stopPropagation(); }, { passive: true });
      }

      return device;
    }

    function buildMessageCard(icon, text) {
      const device = document.createElement("div");
      device.className = "device";
      device.innerHTML =
        '<div class="screen final-screen">' +
          '<span class="deco-icon">' + icon + '</span>' +
          '<div class="question-body">' +
            '<div class="question-text">' + escapeHtml(text) + '</div>' +
          '</div>' +
        '</div>';
      return device;
    }

    function buildScrubberHtml() {
      return '<div class="scrubber"><div class="track"><div class="fill"></div><div class="dot"></div></div>' +
        '<div class="labels"><span class="label-left"></span><span class="label-right"></span></div></div>';
    }

    function buildTransportHtml() {
      return '<div class="transport">' +
        '<button type="button" class="nav prev">' + ICON_PREV + '</button>' +
        '<span class="dot-indicator"></span>' +
        '<button type="button" class="nav next">' + ICON_NEXT + '</button>' +
        '</div>';
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function setupSwipe(total) {
      let index = 0;
      let startX = 0;
      let currentX = 0;
      let dragging = false;
      const stageWidth = function () { return stage.getBoundingClientRect().width; };

      function updateCard(i) {
        const device = deck.children[i];
        const fill = device.querySelector(".fill");
        const dot = device.querySelector(".dot");
        const labelLeft = device.querySelector(".label-left");
        const labelRight = device.querySelector(".label-right");
        const frac = total > 1 ? i / (total - 1) : 0;
        if (fill) fill.style.width = (frac * 100) + "%";
        if (dot) dot.style.left = (frac * 100) + "%";
        if (labelLeft) labelLeft.textContent = "Karte " + (i + 1);
        if (labelRight) labelRight.textContent = (total - 1 - i) + " übrig";

        const prevBtn = device.querySelector(".prev");
        const nextBtn = device.querySelector(".next");
        if (prevBtn) prevBtn.disabled = i === 0;
        if (nextBtn) nextBtn.disabled = i === total - 1;
      }

      function render() {
        deck.style.transform = "translateX(" + (-index * 100) + "%)";
      }

      function goTo(i) {
        index = Math.max(0, Math.min(total - 1, i));
        render();
      }

      for (let i = 0; i < total; i++) {
        updateCard(i);
        const device = deck.children[i];
        device.querySelector(".prev").addEventListener("click", function (e) {
          e.stopPropagation();
          goTo(index - 1);
        });
        device.querySelector(".next").addEventListener("click", function (e) {
          e.stopPropagation();
          goTo(index + 1);
        });
      }

      stage.addEventListener("pointerdown", function (e) {
        if (e.target.closest("button, input, textarea")) return;
        dragging = true;
        startX = e.clientX;
        currentX = 0;
        deck.classList.add("dragging");
        stage.setPointerCapture(e.pointerId);
      });

      stage.addEventListener("pointermove", function (e) {
        if (!dragging) return;
        currentX = e.clientX - startX;
        const basePercent = -index * 100;
        const dragPercent = (currentX / stageWidth()) * 100;
        deck.style.transform = "translateX(" + (basePercent + dragPercent) + "%)";
      });

      function endDrag() {
        if (!dragging) return;
        dragging = false;
        deck.classList.remove("dragging");
        const threshold = stageWidth() * 0.18;
        if (currentX < -threshold) {
          goTo(index + 1);
        } else if (currentX > threshold) {
          goTo(index - 1);
        } else {
          render();
        }
        currentX = 0;
      }

      stage.addEventListener("pointerup", endDrag);
      stage.addEventListener("pointercancel", endDrag);

      window.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight") goTo(index + 1);
        if (e.key === "ArrowLeft") goTo(index - 1);
      });

      window.__goTo = goTo;
      window.__getIndex = function () { return index; };
    }

    function submitFeedback(cardEl) {
      const btn = cardEl.querySelector("#submit-btn");
      btn.disabled = true;
      btn.textContent = "Wird gesendet …";

      const payload = Object.assign({}, answers, { ts: Date.now() });

      function showThanks() {
        deck.innerHTML = "";
        deck.style.transform = "translateX(0)";
        deck.appendChild(buildMessageCard("🌱", "Danke, dass du dir die Zeit genommen hast – dein Feedback hilft wirklich weiter!"));
      }

      whenFirebaseReady(function () {
        const responsesRef = window.fbRef(window.fbDb, "classes/" + klasse + "/responses");
        window.fbPush(responsesRef, payload).then(showThanks).catch(showThanks);
      });
    }
  </script>

</body>
</html>
